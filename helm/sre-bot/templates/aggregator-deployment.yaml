apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.aggregator.appName }}
spec:
  replicas: {{ .Values.aggregator.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.aggregator.appName }}
  template:
    metadata:
      labels:
        app: {{ .Values.aggregator.appName }}
    spec:
      containers:
      - name: agent
        image: {{ .Values.aggregator.image }}:{{ .Values.aggregator.tag }}
        envFrom:
          - configMapRef:
              name: sre-bot-config
        livenessProbe:
            exec:
                command:
                    - python3
                    - -c
                    - "import os; os.getpid()"
            initialDelaySeconds: 10
            periodSeconds: 30
        readinessProbe:
            exec:
                command:
                    - python3
                    - -c
                    - "import os; os.getpid()"
            initialDelaySeconds: 5
            periodSeconds: 30
        resources:
            requests:
                memory: "128Mi"
                cpu: "250m"
            limits:
                memory: "256Mi"
                cpu: "500m"
