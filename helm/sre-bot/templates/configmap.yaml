apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-bot-config
data:
  SCRAPE_TARGET: "{{ .Values.collector.scrapeTarget }}"
  LISTEN_PORT: "{{ .Values.collector.listenPort }}"
  KAFKA_BROKER: "{{ .Values.kafka.broker }}"
  KAFKA_TOPIC: "{{ .Values.kafka.topic }}"
  CLICKHOUSE_HOST: "{{ .Values.clickhouse.host }}"
  OLLAMA_HOST: "{{ .Values.agent.ollamaHost }}"
  OLLAMA_MODEL: "{{ .Values.agent.ollamaModel }}"